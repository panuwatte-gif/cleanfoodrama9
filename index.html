<link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />

<!-- 1) design tokens (KodKlean House)  2) cookbook ui kit  3) prototype styles
     โหลดตามลำดับนี้เสมอ — proto.css override cookbook, cookbook ใช้ tokens -->
<link rel="stylesheet" href="_ds/colors_and_type.css" />
<link rel="stylesheet" href="css/cookbook.css" />
<link rel="stylesheet" href="css/proto.css" />
<!-- 4) Soft Kawaii skin — re-tints tokens + cuddly component polish (loads LAST) -->
<link rel="stylesheet" href="css/kawaii.css" />
</head>
<body>
  <div id="app"></div>

  <!-- Vanilla ES modules — ไม่มี build step เปิดไฟล์รันได้ตรงๆ -->
  <script type="module" src="src/app.js"></script>

  <!-- PWA service worker (cache-first app shell) — try/catch กันพังบนเบราว์เซอร์เก่า -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        try { navigator.serviceWorker.register("sw.js").catch(function () {}); } catch (e) {}
      });
    }
  </script>
</body>
</html>
